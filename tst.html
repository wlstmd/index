<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Underline</title>
  <style>
    .link-text {
      position: relative;
      display: inline-block;
      color: #007bff;
      cursor: pointer;
      text-decoration: none;
    }

    .link-text::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      height: 2px;
      width: 0;
      background-color: #007bff;
      transition: width 0.4s ease-in-out;
    }

    .link-text:hover::after {
      width: 100%;
    }
  </style>
</head>
<body>
  <p>
    <a class="link-text" href="#">마우스를 올려보세요!</a>
  </p>
</body>
</html>
